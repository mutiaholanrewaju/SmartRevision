 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Education | SmartRevision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fef2f2; }
        .option-btn { transition: all 0.2s; text-align: left; width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; background: white; margin-bottom: 0.5rem; cursor: pointer; }
        .option-btn:hover:not(:disabled) { border-color: #ef4444; background-color: #fff1f2; }
        .correct { border-color: #10b981 !important; background-color: #ecfdf5 !important; color: #065f46 !important; font-weight: 700; }
        .wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b !important; }
        .explanation { display: none; margin-top: 0.5rem; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; }
        .active-explanation { display: block !important; }
        .nav-link { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="pb-12">

<!-- NAVIGATION BAR -->
    <nav class="sticky top-0 z-50 bg-white border-b border-red-100 shadow-sm px-4 py-3">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-red-600 font-black text-xl italic">
                <span>🛡️ SmartRevision</span>
            </a>
            <div class="hidden md:flex gap-6 overflow-x-auto">
                <a href="index.html" class="nav-link text-gray-600 hover:text-red-600">Home</a>
                <a href="basicScience_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">Science</a>
                <a href="phe_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">PHE</a>
                <a href="arabic_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">Arabic</a>
                <a href="irs_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">IRS</a>
                <a href="french_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">French</a>
                <a href="civic_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">Civic</a>
            </div>
            <a href="index.html" class="md:hidden text-red-600 font-bold">Menu</a>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 mt-8">
        <!-- Subject Header -->
        <div class="bg-red-600 text-white p-6 rounded-2xl shadow-lg mb-8 text-center">
            <h1 class="text-2xl font-black uppercase tracking-tight">Security Education</h1>
            <p class="text-red-100 mt-1 font-medium italic">Safety First, Everywhere!</p>
            <!-- Score Banner is now visible once the first answer is clicked -->
            <div id="scoreBanner" class="hidden mt-4 bg-white text-red-600 px-4 py-2 rounded-full font-black text-xl animate-bounce">
                Your Score: <span id="currentScore">0</span> / 10
            </div>
        </div>

        <div id="quizContainer" class="space-y-8"></div>

        <!-- Controls -->
        <div class="mt-12 flex flex-col gap-4">
            <button onclick="location.reload()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black text-xl hover:bg-red-700 shadow-xl">RESTART EXAM 🔄</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "What are security precautions?", options: ["Steps taken to make us free and safe from danger.", "Playing with sharp objects.", "Talking to strangers."], correct: 0, note: "Security precautions are rules we follow to stay safe from harm." },
            { q: "Which of these is a source of danger?", options: ["Locking the door.", "A fire outbreak.", "Obeying school rules."], correct: 1, note: "Fire is very dangerous and can cause serious harm." },
            { q: "What should you do before crossing the road?", options: ["Close your eyes and run.", "Look right and left for cars.", "Wait for a stranger to pull you."], correct: 1, note: "Always use your eyes to check for cars before crossing." },
            { q: "Which is a good security precaution at home?", options: ["Leave windows open at night.", "Turn off electrical appliances when not used.", "Leave the floor wet."], correct: 1, note: "Turning off appliances helps prevent fire outbreaks." },
            { q: "Why do staff in an office wear identity (ID) cards?", options: ["To show they are allowed to be there.", "To share with visitors.", "To hide their names."], correct: 0, note: "ID cards help keep the office secure by identifying workers." },
            { q: "What does 'Personal Security' mean?", options: ["Taking extra caution for your own safety.", "Locking only the office gate.", "Following only road signs."], correct: 0, note: "Personal security is being smart and vigilant about your own safety." },
            { q: "What is a good personal security tip for children?", options: ["Go for a long walk at night.", "Always tell loved ones about your movement.", "Keep secrets about movement."], correct: 1, note: "Family should always know where you are so they can protect you." },
            { q: "What should you do if you are being bullied at school?", options: ["Keep it a secret.", "Report the bully to a teacher.", "Fight back."], correct: 1, note: "Teachers are there to help you. Always report bullying!" },
            { q: "In a moving bus, why is it dangerous to stand up?", options: ["Because you might fall if the bus stops.", "Because you are too tall.", "Because you want to see the road."], correct: 0, note: "Sudden stops can make you fall if you are not sitting safely." },
            { q: "What does 'If you see something, say it' mean?", options: ["Keep secrets.", "Report strange or suspicious things immediately.", "Wait until tomorrow."], correct: 1, note: "Reporting danger quickly helps stop bad things from happening." }
        ];

        let score = 0;
        let answeredCount = 0;
        let userAnswers = new Array(questions.length).fill(null);

        function renderQuiz() {
            const container = document.getElementById('quizContainer');
            questions.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-2xl shadow-sm border border-red-50";
                div.innerHTML = `
                    <h3 class="font-bold text-gray-800 mb-4">${idx + 1}. ${item.q}</h3>
                    <div id="options-${idx}" class="space-y-2">
                        ${item.options.map((opt, optIdx) => `
                            <button class="option-btn" onclick="selectAnswer(this, ${idx}, ${optIdx})">${opt}</button>
                        `).join('')}
                    </div>
                    <div id="note-${idx}" class="explanation"></div>
                `;
                container.appendChild(div);
            });
        }

        window.selectAnswer = (btn, qIdx, optIdx) => {
            // Prevent re-answering a question already answered
            if (userAnswers[qIdx] !== null) return;

            const item = questions[qIdx];
            const buttons = btn.parentElement.querySelectorAll('.option-btn');
            const noteDiv = document.getElementById(`note-${qIdx}`);
            
            userAnswers[qIdx] = optIdx;
            answeredCount++;

            // Disable all buttons for this question so they can't change answer
            buttons.forEach(b => b.disabled = true);

            // Show score banner on first interaction
            document.getElementById('scoreBanner').classList.remove('hidden');

            if (optIdx === item.correct) {
                score++;
                btn.classList.add('correct');
                noteDiv.innerHTML = `<span class="text-green-700 font-bold">Well Done!</span><br>${item.note}`;
                noteDiv.classList.add('active-explanation', 'bg-green-50');
            } else {
                btn.classList.add('wrong');
                // Highlight the correct answer so the student learns
                buttons[item.correct].classList.add('correct');
                noteDiv.innerHTML = `<span class="text-red-700 font-bold">Not quite.</span><br>${item.note}`;
                noteDiv.classList.add('active-explanation', 'bg-red-50');
            }

            // Update Score UI immediately
            document.getElementById('currentScore').innerText = score;
        };

        renderQuiz();
    </script>
</body>
</html>
