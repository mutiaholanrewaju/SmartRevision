<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Education Interactive Mock Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; }
        .explanation { display: none; margin-top: 0.5rem; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; }
        .option-btn { transition: all 0.2s; text-align: left; width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; background: white; margin-bottom: 0.5rem; cursor: pointer; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background-color: #eff6ff; }
        .correct { border-color: #10b981 !important; background-color: #ecfdf5 !important; color: #065f46 !important; font-weight: 600; }
        .wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b !important; }
        .active-explanation { display: block !important; }
    </style>
</head>
<body class="p-4 md:p-8">
<!-- NAVIGATION BAR -->
    <nav class="sticky top-0 z-50 bg-white border-b border-red-100 shadow-sm px-4 py-3">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-red-600 font-black text-xl italic">
                <span>🛡️ SmartRevision</span>
            </a>
            <div class="hidden md:flex gap-6 overflow-x-auto">
                <a href="index.html" class="nav-link text-gray-600 hover:text-red-600">Home</a>
                <a href="basicScience_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">Science</a>
                <a href="phe_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">PHE</a>
                <a href="arabic_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">Arabic</a>
                <a href="irs_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">IRS</a>
                <a href="french_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">French</a>
                <a href="civic_2nd_pry1_mock.html" class="nav-link text-gray-400 hover:text-red-600">Civic</a>
            </div>
            <a href="index.html" class="md:hidden text-red-600 font-bold">Menu</a>
        </div>
    </nav>
    
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="bg-blue-700 text-white p-6 rounded-2xl shadow-lg mb-8 text-center">
            <h1 class="text-2xl font-black uppercase tracking-tight">Security Education Mock Exam</h1>
            <p class="text-blue-100 mt-2 font-medium">Primary 1 | Second Term Comprehensive Revision</p>
            <div class="mt-4 flex justify-center gap-4 text-sm">
                <span id="scoreTracker" class="bg-blue-800 px-4 py-1 rounded-full font-bold">Score: 0</span>
                <button onclick="location.reload()" class="bg-white text-blue-700 px-4 py-1 rounded-full font-bold hover:bg-blue-50 transition">Start Over</button>
            </div>
        </div>

        <!-- Section A: Objectives -->
        <div class="space-y-8" id="quizContainer"></div>

        <!-- Section B: Theory Revision -->
        <div class="mt-12 bg-white p-8 rounded-2xl shadow-md border-t-4 border-blue-600">
            <h2 class="text-xl font-black text-blue-900 mb-6 uppercase">Section B: Theory Writing Practice</h2>
            <div class="space-y-6">
                <div>
                    <label class="block font-bold text-gray-700 mb-2">1. What are security precautions?</label>
                    <textarea class="w-full p-3 border-2 border-gray-200 rounded-lg h-20 focus:border-blue-500 outline-none" placeholder="Type answer here..."></textarea>
                </div>
                <div>
                    <label class="block font-bold text-gray-700 mb-2">2. List two (2) security precautions at home.</label>
                    <textarea class="w-full p-3 border-2 border-gray-200 rounded-lg h-20 focus:border-blue-500 outline-none" placeholder="1... 2..."></textarea>
                </div>
                <div>
                    <label class="block font-bold text-gray-700 mb-2">3. List three (3) sources of danger.</label>
                    <textarea class="w-full p-3 border-2 border-gray-200 rounded-lg h-20 focus:border-blue-500 outline-none" placeholder="1... 2... 3..."></textarea>
                </div>
            </div>
        </div>

        <div class="mt-10 text-center text-gray-500 text-sm italic pb-10">
            End of Revision Exam. Stay Safe!
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "What are security precautions?",
                options: [
                    "Steps taken to make us free and safe from danger.",
                    "Running on a busy road.",
                    "Playing with sharp knives."
                ],
                correct: 0,
                note: "Security precautions are the rules we follow to keep ourselves safe from harm."
            },
            {
                q: "Which of these is a 'Source of Danger'?",
                options: [
                    "Eating safe food.",
                    "Talking to strangers.",
                    "Locking the door."
                ],
                correct: 1,
                note: "Strangers are people we don't know, and they can cause us harm."
            },
            {
                q: "Before crossing the road, you should look ________.",
                options: [
                    "Up at the sky.",
                    "Right and left for cars.",
                    "At your shoes."
                ],
                correct: 1,
                note: "Checking both sides helps you see if a car is coming."
            },
            {
                q: "At home, we should always ________ the doors and windows.",
                options: [
                    "Lock",
                    "Leave open",
                    "Break"
                ],
                correct: 0,
                note: "Locking doors keeps bad people and danger out of our house."
            },
            {
                q: "In the office, we install ________ to watch for security purposes.",
                options: [
                    "TV for cartoons",
                    "CCTV cameras",
                    "Large mirrors"
                ],
                correct: 1,
                note: "CCTV cameras record everything to help keep the office safe."
            },
            {
                q: "What should you do if you are being bullied at school?",
                options: [
                    "Keep it a secret.",
                    "Report it to a teacher.",
                    "Fight the person."
                ],
                correct: 1,
                note: "Reporting bullying helps the school stop it and keep you safe."
            },
            {
                q: "Personal security means taking ________ caution for your safety.",
                options: [
                    "No",
                    "Small",
                    "Extra"
                ],
                correct: 2,
                note: "Personal security is about your own extra effort to stay safe at all times."
            },
            {
                q: "In a car, children should sit in the ________.",
                options: [
                    "Front seat",
                    "Back seat",
                    "On the roof"
                ],
                correct: 1,
                note: "The back seat is the safest place for children in a vehicle."
            },
            {
                q: "A source of danger at home is a ________.",
                options: [
                    "Clean floor",
                    "Wet floor",
                    "Locked window"
                ],
                correct: 1,
                note: "A wet floor is a danger because it can make you slip and fall."
            },
            {
                q: "Staff in an office should NOT share their ________.",
                options: [
                    "Lunch",
                    "Identity cards",
                    "Pens"
                ],
                correct: 1,
                note: "Sharing ID cards is unsafe because strangers can use them to enter the office."
            },
            {
                q: "When crossing the road, you must obey the ________.",
                options: [
                    "Traffic light",
                    "Bird signals",
                    "Wind direction"
                ],
                correct: 0,
                note: "Traffic lights tell you exactly when it is safe to walk."
            },
            {
                q: "At school, the rule is: 'If you see something, ________'.",
                options: [
                    "Hide it",
                    "Say it",
                    "Forget it"
                ],
                correct: 1,
                note: "Reporting strange things immediately helps prevent danger."
            },
            {
                q: "You should avoid night travel because ________.",
                options: [
                    "It is safer",
                    "It is dangerous",
                    "The moon is out"
                ],
                correct: 1,
                note: "Danger is harder to see in the dark, so avoid moving at night."
            },
            {
                q: "A security guard should be at the office ________.",
                options: [
                    "Roof",
                    "Gate",
                    "Toilet"
                ],
                correct: 1,
                note: "Guards at the gate check everyone entering to keep the office safe."
            },
            {
                q: "You should always tell your ________ about your movement.",
                options: [
                    "Strangers",
                    "Loved ones",
                    "Toys"
                ],
                correct: 1,
                note: "Letting family know where you are helps them protect you."
            }
        ];

        let score = 0;
        const container = document.getElementById('quizContainer');

        function renderQuiz() {
            questions.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = "bg-white p-6 rounded-2xl shadow-sm border border-gray-100";
                
                let optionsHtml = item.options.map((opt, optIndex) => `
                    <button class="option-btn" onclick="checkAnswer(this, ${index}, ${optIndex})">
                        ${opt}
                    </button>
                `).join('');

                qDiv.innerHTML = `
                    <h3 class="text-lg font-bold text-gray-800 mb-4">${index + 1}. ${item.q}</h3>
                    <div class="options-container">${optionsHtml}</div>
                    <div id="note-${index}" class="explanation"></div>
                `;
                container.appendChild(qDiv);
            });
        }

        window.checkAnswer = function(btn, qIdx, optIdx) {
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('button');
            const noteDiv = document.getElementById(`note-${qIdx}`);
            const isCorrect = optIdx === questions[qIdx].correct;

            // Disable all buttons for this question
            buttons.forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct');
                score += 1;
                document.getElementById('scoreTracker').innerText = `Score: ${score}`;
                noteDiv.innerHTML = `<span class="font-bold text-green-700">Correct!</span><br>${questions[qIdx].note}`;
                noteDiv.classList.add('active-explanation', 'bg-green-50', 'text-green-800');
            } else {
                btn.classList.add('wrong');
                // Highlight correct answer
                buttons[questions[qIdx].correct].classList.add('correct');
                noteDiv.innerHTML = `<span class="font-bold text-red-700">Incorrect!</span><br>${questions[qIdx].note}`;
                noteDiv.classList.add('active-explanation', 'bg-red-50', 'text-red-800');
            }
        }

        renderQuiz();
    </script>
</body>
</html>
