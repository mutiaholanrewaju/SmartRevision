    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .explanation { display: none; margin-top: 0.5rem; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; }
        .option-btn { transition: all 0.2s; text-align: left; width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 0.75rem; background: white; margin-bottom: 0.5rem; cursor: pointer; font-weight: 500; }
        .option-btn:hover:not(:disabled) { border-color: #3b82f6; background-color: #eff6ff; }
        .correct { border-color: #10b981 !important; background-color: #ecfdf5 !important; color: #065f46 !important; font-weight: 700; }
        .wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b !important; }
        .active-explanation { display: block !important; }
    </style>
   <!-- Vercel Web Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
</head>

        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-red-600 font-black text-xl italic">
                <span>🛡️ SmartRevision</span>
            </a>
            <div class="hidden md:flex gap-6 overflow-x-auto">
                <a href="index.html" class="nav-link text-gray-600 hover:text-red-600">Home</a>
                <a href="basic_science_mock.html" class="nav-link text-gray-400 hover:text-red-600">Science</a>
                <a href="phe_mock_exam.html" class="nav-link text-gray-400 hover:text-red-600">PHE</a>
                <a href="arabic_mock_exam.html" class="nav-link text-gray-400 hover:text-red-600">Arabic</a>
                <a href="irs_mock_exam.html" class="nav-link text-gray-400 hover:text-red-600">IRS</a>
                <a href="french_mock_exam.html" class="nav-link text-gray-400 hover:text-red-600">French</a>
                <a href="civic_education_mock.html" class="nav-link text-gray-400 hover:text-red-600">Civic</a>
            </div>
            <a href="index.html" class="md:hidden text-red-600 font-bold">Menu</a>
        </div>
    </nav>
  
    <div class="max-w-3xl mx-auto">
        <!-- HEADER SECTION -->
        <div id="headerColor" class="bg-indigo-700 text-white p-6 rounded-2xl shadow-lg mb-8 text-center">
            <h1 id="subjectTitle" class="text-2xl font-black uppercase tracking-tight">Subject Name</h1>
            <p class="text-indigo-100 mt-2 font-medium">Primary 1 | Revision Exam</p>
            <div class="mt-4 flex justify-center gap-4 text-sm">
                <span id="scoreTracker" class="bg-indigo-800 px-4 py-1 rounded-full font-bold">Score: 0</span>
                <button onclick="location.reload()" class="bg-white text-indigo-700 px-4 py-1 rounded-full font-bold hover:bg-indigo-50 transition">Restart</button>
            </div>
        </div>

        <!-- QUIZ CONTAINER -->
        <div class="space-y-8" id="quizContainer"></div>

        <div class="mt-10 text-center text-gray-400 text-sm italic pb-10">
            Created for Primary 1 Learning Support
        </div>
    </div>

    <script>
        /* ==========================================
           THE ENGINE: PASTE YOUR QUESTIONS BELOW
           ========================================== */
        const examData = {
            title: "New Subject Name", // CHANGE THIS
            headerBg: "bg-indigo-700",  // YOU CAN CHANGE COLOR (e.g., bg-red-600)
            questions: [
                {
                    q: "Example Question: What is a Hero?",
                    options: [
                        "A brave person who helps others",
                        "Someone who sleeps",
                        "A tall tree"
                    ],
                    correct: 0,
                    note: "Heroes are brave and kind people in our community."
                },
                // ADD MORE QUESTIONS HERE FOLLOWING THE SAME FORMAT
            ]
        };

        // UI Logic
        document.getElementById('subjectTitle').innerText = examData.title;
        document.getElementById('headerColor').className = `${examData.headerBg} text-white p-6 rounded-2xl shadow-lg mb-8 text-center`;

        let score = 0;
        const container = document.getElementById('quizContainer');

        function renderQuiz() {
            examData.questions.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = "bg-white p-6 rounded-2xl shadow-sm border border-gray-100";
                let optionsHtml = item.options.map((opt, optIndex) => `
                    <button class="option-btn" onclick="checkAnswer(this, ${index}, ${optIndex})">${opt}</button>
                `).join('');
                qDiv.innerHTML = `
                    <h3 class="text-lg font-bold text-gray-800 mb-4">${index + 1}. ${item.q}</h3>
                    <div class="options-container">${optionsHtml}</div>
                    <div id="note-${index}" class="explanation"></div>
                `;
                container.appendChild(qDiv);
            });
        }

        window.checkAnswer = function(btn, qIdx, optIdx) {
            const buttons = btn.parentElement.querySelectorAll('button');
            const noteDiv = document.getElementById(`note-${qIdx}`);
            const isCorrect = optIdx === examData.questions[qIdx].correct;
            buttons.forEach(b => b.disabled = true);
            if (isCorrect) {
                btn.classList.add('correct');
                score++;
                document.getElementById('scoreTracker').innerText = `Score: ${score}`;
                noteDiv.innerHTML = `<span class="font-bold text-green-700">Correct!</span><br>${examData.questions[qIdx].note}`;
                noteDiv.classList.add('active-explanation', 'bg-green-50', 'text-green-800');
            } else {
                btn.classList.add('wrong');
                buttons[examData.questions[qIdx].correct].classList.add('correct');
                noteDiv.innerHTML = `<span class="font-bold text-red-700">Incorrect!</span><br>${examData.questions[qIdx].note}`;
                noteDiv.classList.add('active-explanation', 'bg-red-50', 'text-red-800');
            }
        };

        renderQuiz();
    </script>
</body>
