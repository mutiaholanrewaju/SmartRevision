<head>

    <title>SmartSpeller | Primary Mastery</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"SmartSpeller","short_name":"Speller","start_url":".","display":"standalone","background_color":"#f0fdf4","theme_color":"#10b981","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/5607/5607212.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; -webkit-tap-highlight-color: transparent; }
        .nav-link { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        
        @keyframes pulse-green {
            0%, 100% { background-color: #10b981; transform: scale(1); }
            50% { background-color: #059669; transform: scale(1.05); }
        }
        .speaking { animation: pulse-green 1s infinite; }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .word-grid::-webkit-scrollbar { height: 6px; }
        .word-grid::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        
        .visual-word-box {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            padding: 1rem;
        }

        .visual-word-text {
            font-weight: 900;
            color: white;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 10;
            text-align: center;
            line-height: 1.1;
            word-break: break-word;
        }

        .visual-bg-pattern {
            position: absolute;
            font-size: 10rem;
            opacity: 0.05;
            font-weight: 900;
            color: white;
            white-space: nowrap;
            user-select: none;
        }

        .wrong-option {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            color: #991b1b !important;
        }
        
        /* Fixed Nav alignment for mobile balance */
        .nav-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
        }
    </style>
    <!-- Vercel Web Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="pb-12 min-h-screen">

                   🏠 Home

            <!-- Center Side -->

        let currentLevel = "";
        let currentIndex = 0;

        function showHome() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="text-center py-6">
                    <h1 class="text-3xl font-black text-green-800 mb-2 uppercase tracking-tight text-balance">SmartSpeller Hub</h1>
                    <p class="text-gray-600 mb-8 font-medium italic">90+ Words | Master Your Notes! 🇳🇬</p>
                    <div class="space-y-4">
                        ${Object.keys(levels).map(level => {
                            const prog = localStorage.getItem(`prog_${level}`) || 0;
                            return `
                            <button onclick="startLevel('${level}', ${prog})" class="w-full bg-white p-6 rounded-3xl shadow-sm border-2 border-green-100 hover:border-green-400 hover:shadow-md transition text-left group flex justify-between items-center">
                                <div class="pr-4">
                                    <h3 class="text-lg font-bold text-gray-800 group-hover:text-green-600 uppercase tracking-tight">${level}</h3>
                                    <p class="text-[10px] text-gray-400 mt-1 uppercase font-black tracking-widest text-wrap">Progress: ${prog}/${levels[level].length}</p>
                                </div>
                                <span class="text-2xl text-green-200 group-hover:text-green-500 transition">➔</span>
                            </button>`}).join('')}
                    </div>
                    <div class="mt-12 pt-6 border-t border-green-100">
                        <a href="index.html" class="inline-block bg-white text-green-600 border-2 border-green-100 px-8 py-3 rounded-2xl font-black uppercase text-sm hover:bg-green-50 transition shadow-sm">
                            Back to Mock Exams 🏠
                        </a>
                    </div>
                </div>
            `;
        }

        function startLevel(lvl, index) {
            currentLevel = lvl;
            currentIndex = Math.min(parseInt(index), levels[lvl].length - 1);
            showLookStep();
        }

        function speak(text) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.65; // Slow & Clear
            utterance.pitch = 0.8; // Lower & Deliberate
            window.speechSynthesis.speak(utterance);
        }

        function jumpToWord(idx) {
            currentIndex = idx;
            showLookStep();
        }

        function renderHeader() {
            return `
                <div class="mb-4">
                    <div class="flex justify-between items-center text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 px-1">
                        <button onclick="showHome()" class="hover:text-red-500 transition">✖ QUIT</button>
                        <span class="text-green-600">${currentLevel}</span>
                        <span>Word ${currentIndex + 1}/${levels[currentLevel].length}</span>
                    </div>
                    <div id="word-grid-container" class="word-grid flex gap-2 overflow-x-auto pb-3 mb-2 px-1">
                        ${levels[currentLevel].map((w, i) => `
                            <button id="nav-item-${i}" onclick="jumpToWord(${i})" class="flex-shrink-0 w-10 h-10 rounded-full text-xs font-bold border-2 transition
                                ${i === currentIndex ? 'border-green-600 bg-green-600 text-white shadow-md' : 
                                  i < currentIndex ? 'border-green-200 bg-green-50 text-green-600' : 'border-gray-100 bg-white text-gray-400'}">
                                ${i + 1}
                            </button>`).join('')}
                    </div>
                </div>
            `;
        }

        function autoScrollNav() {
            setTimeout(() => {
                const activeItem = document.getElementById(`nav-item-${currentIndex}`);
                if (activeItem) {
                    activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }, 100);
        }

        function getDynamicFontSize(word) {
            const len = word.length;
            if (len > 12) return '1.8rem';
            if (len > 10) return '2.3rem';
            return '3.5rem';
        }

        function showLookStep() {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            const fontSize = getDynamicFontSize(wordObj.word);
            
            app.innerHTML = `
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-t-8 border-green-500">
                    ${renderHeader()}
                    <div class="text-center">
                        <div class="visual-word-box mb-6">
                            <div class="visual-bg-pattern uppercase">${wordObj.word}</div>
                            <h1 class="visual-word-text capitalize" style="font-size: ${fontSize}">${wordObj.word}</h1>
                        </div>
                        <button onclick="speak('${wordObj.word}')" class="mb-4 bg-green-100 p-4 rounded-full shadow-sm hover:bg-green-200 transition">🔊 Hear Word</button>
                        <h2 class="text-4xl font-black text-gray-800 mb-2 tracking-tight capitalize">${wordObj.word}</h2>
                        <div class="flex justify-center gap-2 mb-4 flex-wrap">
                            ${wordObj.chunks.split('-').map(c => `<span class="bg-green-50 px-3 py-1 rounded-lg text-green-700 font-bold border border-green-100 text-lg uppercase">${c}</span>`).join('')}
                        </div>
                        <p class="text-gray-400 text-sm italic px-4">"${wordObj.hint}"</p>
                    </div>
                    <button onclick="showCopyStep()" class="mt-8 w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg transform active:scale-95 transition uppercase tracking-widest">I'VE LOOKED. NEXT ➔</button>
                </div>
            `;
            localStorage.setItem(`prog_${currentLevel}`, currentIndex);
            speak(wordObj.word);
            autoScrollNav();
        }

        function showCopyStep() {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            const fontSize = getDynamicFontSize(wordObj.word);

            app.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-yellow-500">
                    ${renderHeader()}
                    <div class="text-center mb-8">
                        <h2 class="font-black text-gray-800 mb-4 leading-none capitalize" style="font-size: ${fontSize}">${wordObj.word}</h2>
                        <p class="text-yellow-700 text-xs font-bold uppercase tracking-widest italic underline underline-offset-4 decoration-yellow-200">Step 2: Copy the word</p>
                    </div>
                    <input type="text" id="copy-input" autocomplete="off" spellcheck="false" class="w-full text-center text-3xl font-bold p-4 border-b-4 border-gray-200 focus:border-yellow-500 outline-none mb-2 text-gray-700 bg-gray-50 rounded-t-xl" placeholder="...">
                    <div id="copy-error" class="text-red-500 font-black text-[10px] uppercase text-center mb-4 opacity-0 transition-opacity">❌ Incorrect! Check the letters.</div>
                    <button onclick="validateCopy()" class="w-full bg-yellow-500 text-white py-4 rounded-2xl font-black text-xl shadow-lg uppercase tracking-widest">CHECK WORD ➔</button>
                </div>
            `;
            document.getElementById('copy-input').focus();
            autoScrollNav();
        }

        function validateCopy() {
            const input = document.getElementById('copy-input');
            const error = document.getElementById('copy-error');
            if (input.value.trim().toLowerCase() === levels[currentLevel][currentIndex].word.toLowerCase()) {
                showCoverStep();
            } else {
                input.classList.add('shake', 'border-red-500');
                error.style.opacity = '1';
                setTimeout(() => { input.classList.remove('shake', 'border-red-500'); error.style.opacity = '0'; }, 1500);
            }
        }

        function showCoverStep() {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-purple-500">
                    ${renderHeader()}
                    <div class="h-40 flex flex-col items-center justify-center bg-gray-900 rounded-[1.5rem] mb-8 relative overflow-hidden">
                        <span class="text-white/10 font-black text-5xl tracking-widest uppercase select-none">Hidden</span>
                        <button onclick="speak('${wordObj.word}')" class="mt-4 bg-purple-600 text-white px-6 py-2 rounded-full font-black uppercase border border-purple-400 hover:bg-purple-700 transition shadow-lg text-[10px]">🔊 Hear Word</button>
                    </div>
                    <div class="text-center mb-6">
                         <p class="text-purple-700 text-xs font-bold uppercase tracking-widest italic underline underline-offset-4 decoration-purple-200">Step 3: Write from memory</p>
                    </div>
                    <input type="text" id="write-input" autocomplete="off" spellcheck="false" class="w-full text-center text-3xl font-bold p-4 border-b-4 border-gray-200 focus:border-purple-500 outline-none mb-2 text-gray-700 bg-gray-50 rounded-t-xl" placeholder="...">
                    <div id="write-error" class="text-red-500 font-black text-[10px] uppercase text-center mb-4 opacity-0 transition-opacity">❌ Not quite! Keep editing.</div>
                    <button onclick="validateFinal()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg uppercase tracking-widest">CONFIRM 🏁</button>
                </div>
            `;
            document.getElementById('write-input').focus();
            speak(wordObj.word);
            autoScrollNav();
        }

        function validateFinal() {
            const input = document.getElementById('write-input');
            const error = document.getElementById('write-error');
            const val = input.value.trim().toLowerCase();
            const correct = levels[currentLevel][currentIndex].word.toLowerCase();

            if (val === correct) {
                totalStars += 10;
                localStorage.setItem('speller_stars', totalStars);
                document.getElementById('global-score').innerText = `STARS: ${totalStars}`;
                showVisualMemoryStep(null); 
            } else {
                input.classList.add('shake', 'border-red-500');
                error.style.opacity = '1';
                setTimeout(() => { 
                    input.classList.remove('shake', 'border-red-500');
                    error.style.opacity = '0';
                    input.focus(); // Value is not cleared, stays editable
                }, 1500);
            }
        }

        function showVisualMemoryStep(wrongInput) {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            const correct = wordObj.word.toLowerCase();
            
            let options = [correct, ...wordObj.distractors];
            if (wrongInput && !options.includes(wrongInput.toLowerCase())) options.push(wrongInput.toLowerCase());
            options = [...new Set(options)].sort(() => Math.random() - 0.5).slice(0, 3);

            app.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-red-500">
                    <div class="text-center mb-8 px-2">
                        <span class="text-6xl">👀</span>
                        <h2 class="text-2xl font-black text-gray-800 mt-4 uppercase tracking-tight">Visual Check</h2>
                        <p class="text-gray-500 text-sm font-bold mt-2 text-balance italic text-center">Which one matches the correct spelling?</p>
                        <div id="visual-error" class="text-red-500 font-black text-xs uppercase mt-2 opacity-0 transition-opacity">❌ Incorrect, try again!</div>
                        <button onclick="speak('${wordObj.word}')" class="mt-4 text-red-600 font-black text-[10px] uppercase border border-red-100 px-4 py-2 rounded-full">🔊 Listen Again</button>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        ${options.map(opt => {
                            const btnFontSize = opt.length > 12 ? 'text-xl' : 'text-3xl';
                            return `
                            <button onclick="checkVisualChoice('${opt}', this)" class="p-8 border-4 border-gray-100 rounded-[1.5rem] font-black text-gray-700 hover:border-green-500 hover:bg-green-50 transition active:scale-95 ${btnFontSize}">
                                ${opt}
                            </button>`}).join('')}
                    </div>
                </div>
            `;
            autoScrollNav();
        }

        function checkVisualChoice(choice, btn) {
            const correct = levels[currentLevel][currentIndex].word.toLowerCase();
            if (choice.toLowerCase() === correct) {
                totalStars += 5;
                localStorage.setItem('speller_stars', totalStars);
                document.getElementById('global-score').innerText = `STARS: ${totalStars}`;
                showSuccess();
            } else {
                btn.classList.add('shake', 'wrong-option');
                document.getElementById('visual-error').style.opacity = '1';
                setTimeout(() => { 
                    btn.classList.remove('shake');
                }, 500);
            }
        }

        function showSuccess() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-12 rounded-[2rem] shadow-xl text-center border-t-8 border-green-500">
                    <span class="text-8xl">🏆</span>
                    <h3 class="text-4xl font-black text-green-600 uppercase mt-6 mb-2 tracking-tight">Perfect!</h3>
                    <p class="text-gray-500 mb-8 font-medium italic px-4 text-center">You identified the correct spelling!</p>
                    <button onclick="nextWord()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg transform hover:scale-105 transition uppercase tracking-widest">NEXT WORD ➔</button>
                </div>
            `;
            autoScrollNav();
        }

        function nextWord() {
            currentIndex++;
            if (currentIndex < levels[currentLevel].length) showLookStep();
            else showLevelComplete();
        }

        function showLevelComplete() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-12 rounded-[2.5rem] shadow-xl text-center border-t-8 border-indigo-500">
                    <h2 class="text-3xl font-black text-indigo-800 uppercase mb-2">Level Mastered!</h2>
                    <p class="text-gray-500 mb-8 font-medium italic px-6 text-center">Excellent work! You are a spelling star.</p>
                    <div class="text-8xl mb-10">🥇</div>
                    <button onclick="showHome()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl hover:bg-indigo-700 shadow-xl transition uppercase tracking-widest">BACK TO HUB 🏠</button>
                </div>
            `;
        }

        showHome();
    </script>

     <!-- Footer -->
    <footer class="text-center py-10 text-gray-400 text-sm border-t border-gray-100 mt-12">
        <p>© 2026 Smart Revision Hub | Built for Excellence by Mutiah</p>
    </footer>
</body>
</html>
