<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpeller | Primary 1 Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; }
        .nav-link { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        
        @keyframes pulse-green {
            0%, 100% { background-color: #10b981; border-color: #059669; transform: scale(1); }
            50% { background-color: #059669; border-color: #047857; transform: scale(1.05); }
        }
        .speaking { animation: pulse-green 1s infinite; pointer-events: none; }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="pb-12 min-h-screen">

    <!-- Navigation Bar -->
    <nav id="global-nav" class="sticky top-0 z-50 bg-white border-b border-green-100 shadow-sm px-4 py-3">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <button onclick="showHome()" class="flex items-center gap-2 text-green-600 font-black text-xl italic">
                <span>📚 SmartSpeller</span>
            </button>
            <div id="global-score" class="bg-green-100 text-green-700 px-4 py-1 rounded-full text-xs font-black">STARS: 0</div>
        </div>
    </nav>

    <div id="app" class="max-w-2xl mx-auto px-4 mt-8">
        <!-- App content injected here -->
    </div>

    <script>
        const apiKey = ""; 
        let totalStars = 0;
        const audioCache = new Map(); // Store audio to make replay instant

        // COMPREHENSIVE 70-WORD LIST

                { word: "balloon", chunks: "bal-loon", hint: "Air fills this up." },
                { word: "sandy", chunks: "san-dy", hint: "A type of grainy soil." },
                { word: "clayey", chunks: "clay-ey", hint: "Soil for making pots." },
                { word: "loamy", chunks: "loam-y", hint: "Best soil for farmers." },
                { word: "stone", chunks: "stone", hint: "Rock particles in soil." },
                { word: "candle", chunks: "can-dle", hint: "A source of light." },
                { word: "charcoal", chunks: "char-coal", hint: "It is black in colour." },
                { word: "cotton", chunks: "cot-ton", hint: "It is white in colour." },
                { word: "purple", chunks: "pur-ple", hint: "A secondary colour." },
                { word: "danger", chunks: "dan-ger", hint: "Something that can hurt." },
                { word: "knife", chunks: "knife", hint: "A sharp object." },
                { word: "fenced", chunks: "fen-ced", hint: "Office security feature." },
                { word: "gated", chunks: "gat-ed", hint: "Office security feature." },
                { word: "skills", chunks: "skills", hint: "Abilities in football." },
                { word: "kicking", chunks: "kick-ing", hint: "Football skill." },
                { word: "bata", chunks: "ba-ta", hint: "A traditional instrument." },
                { word: "refuge", chunks: "ref-uge", hint: "To seek protection." },
                { word: "mankind", chunks: "man-kind", hint: "Malia-n-Nas meaning." },
                { word: "yam", chunks: "yam", hint: "Igname in French." }
            ],
            "Level 2: Medium Mastery": [
                { word: "substance", chunks: "sub-stance", hint: "Air is a gaseous ______." },
                { word: "existence", chunks: "ex-is-tence", hint: "Showing air is there." },
                { word: "particles", chunks: "par-ti-cles", hint: "Rock pieces in soil." },
                { word: "identify", chunks: "i-den-ti-fy", hint: "Recognizing logos." },
                { word: "primary", chunks: "pri-ma-ry", hint: "Main type of colours." },
                { word: "secondary", chunks: "sec-on-da-ry", hint: "Mixed colours." },
                { word: "strangers", chunks: "stran-gers", hint: "People we don't know." },
                { word: "accident", chunks: "ac-ci-dent", hint: "Happens on the road." },
                { word: "watchful", chunks: "watch-ful", hint: "Being careful at home." },
                { word: "vigilant", chunks: "vi-gi-lant", hint: "Act smart and fast." },
                { word: "movement", chunks: "move-ment", hint: "Report strange things." },
                { word: "rules", chunks: "rules", hint: "Follow them at school." },
                { word: "stopping", chunks: "stop-ping", hint: "Football skill." },
                { word: "heading", chunks: "head-ing", hint: "Football skill." },
                { word: "dribbling", chunks: "drib-bling", hint: "Football skill." },
                { word: "floating", chunks: "float-ing", hint: "Staying up in water." },
                { word: "breathing", chunks: "breath-ing", hint: "Skill for swimming." },
                { word: "mischief", chunks: "mis-chief", hint: "Whisper of evil." },
                { word: "blessing", chunks: "bless-ing", hint: "Barakah from Allah." },
                { word: "listening", chunks: "lis-ten-ing", hint: "Way to obey parents." }
            ],
            "Level 3: Long & Tricky": [
                { word: "gaseous", chunks: "ga-se-ous", hint: "Air is a ______ substance." },
                { word: "decoration", chunks: "dec-o-ra-tion", hint: "Using colour to beautify." },
                { word: "precautions", chunks: "pre-cau-tions", hint: "Steps to stay safe." },
                { word: "suspicious", chunks: "sus-pi-cious", hint: "Strange movements." },
                { word: "appliances", chunks: "ap-pli-an-ces", hint: "Electrical items." },
                { word: "identities", chunks: "i-den-ti-ties", hint: "Staff ID cards." },
                { word: "clearance", chunks: "clear-ance", hint: "Given to visitors." },
                { word: "installation", chunks: "in-stal-la-tion", hint: "Setting up CCTV." },
                { word: "environment", chunks: "en-vi-ron-ment", hint: "Place around us." },
                { word: "regulations", chunks: "reg-u-la-tions", hint: "School rules and..." },
                { word: "indigenous", chunks: "in-di-ge-nous", hint: "Local games." },
                { word: "butterfly", chunks: "but-ter-fly", hint: "Swimming stroke." },
                { word: "backstroke", chunks: "back-stroke", hint: "Swimming stroke." },
                { word: "coordinates", chunks: "co-or-di-nates", hint: "What a referee does." },
                { word: "alphabet", chunks: "al-pha-bet", hint: "Letters like A to Z." },
                { word: "orphanage", chunks: "or-pha-nage", hint: "Home for children." },
                { word: "achievement", chunks: "a-chieve-ment", hint: "What someone has done." },
                { word: "governor", chunks: "gov-er-nor", hint: "Leader of a state." },
                { word: "president", chunks: "pres-i-dent", hint: "Leader of a country." },
                { word: "traditional", chunks: "tra-di-tion-al", hint: "Local music." }
            ],
            "Level 4: Mega Challenge": [
                { word: "characteristics", chunks: "cha-rac-te-ris-tics", hint: "Hero qualities." },
                { word: "hardworking", chunks: "hard-work-ing", hint: "A hero works very..." },
                { word: "cleanliness", chunks: "clean-li-ness", hint: "Taharah teaching." },
                { word: "surroundings", chunks: "sur-round-ings", hint: "Area around us." },
                { word: "ablution", chunks: "ab-lu-tion", hint: "Al-wudu process." },
                { word: "obedience", chunks: "o-be-di-ence", hint: "Doing what you are told." },
                { word: "democratic", chunks: "dem-o-cra-tic", hint: "Part of NNDP name." },
                { word: "instrument", chunks: "in-stru-ment", hint: "Used for music." },
                { word: "xylophone", chunks: "xy-lo-phone", hint: "Musical instrument." },
                { word: "unconscious", chunks: "un-con-scious", hint: "A tricky spelling." }
            ]
        };

        let currentLevel = "";
        let currentIndex = 0;

        function showHome() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="text-center py-6">
                    <h1 class="text-3xl font-black text-green-800 mb-2 uppercase tracking-tight">SmartSpeller Hub</h1>
                    <p class="text-gray-600 mb-8 font-medium italic">Master 70 Tricky Words from your Notes! 🇳🇬</p>
                    
                    <div class="space-y-4">
                        ${Object.keys(levels).map(level => `
                            <button onclick="startLevel('${level}')" class="w-full bg-white p-6 rounded-3xl shadow-sm border-2 border-green-100 hover:border-green-500 transition text-left group flex justify-between items-center">
                                <div>
                                    <h3 class="text-lg font-bold text-gray-800 group-hover:text-green-600 uppercase tracking-tight">${level}</h3>
                                    <p class="text-[10px] text-gray-400 mt-1 uppercase font-black tracking-widest">${levels[level].length} Challenge Words</p>
                                </div>
                                <span class="text-2xl text-green-200 group-hover:text-green-500 transition">➔</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function startLevel(lvl) {
            currentLevel = lvl;
            currentIndex = 0;
            showLookStep();
        }

        async function speakWord(text) {
            const btns = document.querySelectorAll('.speak-btn');
            
            // 1. Check if we already have this audio in cache
            if (audioCache.has(text)) {
                const audio = new Audio(audioCache.get(text));
                btns.forEach(b => b.classList.add('speaking'));
                audio.play();
                audio.onended = () => btns.forEach(b => b.classList.remove('speaking'));
                return;
            }

            // 2. Otherwise, fetch it once
            btns.forEach(b => {
                b.classList.add('speaking');
                b.innerHTML = '<span class="text-[10px] font-black uppercase">Loading...</span>';
            });
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Speak in a very clear, professional Nigerian teacher's voice. Say: "The word is ${text}." Then pause and say "${text}" one more time.` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });

                if (!response.ok) throw new Error('API request failed');
                
                const result = await response.json();
                const audioData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                
                if (!audioData) throw new Error('No audio data received');

                const audioBlob = pcmToWavBlob(audioData, 24000);
                const audioUrl = URL.createObjectURL(audioBlob);
                
                // Cache the URL so the next click is instant
                audioCache.set(text, audioUrl);

                const audio = new Audio(audioUrl);
                audio.play();
                audio.onended = () => { 
                    btns.forEach(b => {
                        b.classList.remove('speaking');
                        b.innerHTML = '<span class="text-2xl">🔊</span>';
                    });
                };
            } catch (e) { 
                console.error("Audio Error:", e); 
                btns.forEach(b => {
                    b.classList.remove('speaking');
                    b.innerHTML = '<span class="text-2xl">🔊</span>';
                });
            }
        }

        function pcmToWavBlob(base64Pcm, sampleRate) {
            const pcmData = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0));
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            view.setUint32(0, 0x52494646, false); 
            view.setUint32(4, 36 + pcmData.length, true);
            view.setUint32(8, 0x57415645, false); 
            view.setUint32(12, 0x666d7420, false); 
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); 
            view.setUint32(40, pcmData.length, true);
            return new Blob([wavHeader, pcmData], { type: 'audio/wav' });
        }

        function renderHeader() {
            return `
                <div class="flex justify-between items-center mb-6">
                    <button onclick="showHome()" class="text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-red-500 transition">✖ QUIT</button>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-black text-green-600 uppercase tracking-widest">${currentIndex + 1} / ${levels[currentLevel].length}</span>
                        <div class="w-24 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-green-500" style="width: ${((currentIndex + 1) / levels[currentLevel].length) * 100}%"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function showLookStep() {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-green-500">
                    ${renderHeader()}
                    <div class="text-center mb-10">
                        <button onclick="speakWord('${wordObj.word}')" class="speak-btn mb-6 bg-green-100 p-5 rounded-full hover:bg-green-200 transition shadow-sm">
                            <span class="text-2xl">🔊</span>
                        </button>
                        <h2 class="text-5xl font-black text-gray-800 mb-4 tracking-tight">${wordObj.word}</h2>
                        <div class="flex justify-center gap-2">
                            ${wordObj.chunks.split('-').map(c => `<span class="bg-gray-50 px-3 py-1 rounded-lg text-green-600 font-bold text-lg border border-green-50">${c}</span>`).join('')}
                        </div>
                        <p class="text-gray-400 mt-6 text-sm italic">"${wordObj.hint}"</p>
                    </div>
                    <div class="space-y-4">
                        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-center">
                            <h4 class="text-blue-800 font-black text-xs uppercase mb-1 tracking-widest italic">Step 1: Look & Clap</h4>
                            <p class="text-blue-700 text-sm">Clap as you see the green chunks!</p>
                        </div>
                        <button onclick="showCopyStep()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg transition transform active:scale-95">Next: Copy ➔</button>
                    </div>
                </div>
            `;
            speakWord(wordObj.word);
        }

        function showCopyStep() {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-yellow-500">
                    ${renderHeader()}
                    <div class="text-center mb-6">
                        <button onclick="speakWord('${wordObj.word}')" class="speak-btn bg-yellow-100 p-4 rounded-full mb-4">
                            <span class="text-xl">🔊</span>
                        </button>
                        <h2 class="text-5xl font-black text-gray-800 mb-8">${wordObj.word}</h2>
                    </div>
                    <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-100 mb-6 text-center">
                        <h4 class="text-yellow-800 font-black text-xs uppercase mb-1 tracking-widest">Step 2: Copy</h4>
                        <p class="text-yellow-700 text-sm italic">Type the word exactly like it is above.</p>
                    </div>
                    <input type="text" id="copy-input" autocomplete="off" class="w-full text-center text-3xl font-bold p-4 border-b-4 border-gray-200 focus:border-yellow-500 outline-none mb-2 text-gray-700 bg-gray-50 rounded-t-xl" placeholder="...">
                    <div id="copy-error" class="text-red-500 font-black text-xs uppercase text-center mb-4 opacity-0 transition-opacity">❌ Try Again! Check the spelling above.</div>
                    <button onclick="validateCopy()" class="w-full bg-yellow-500 text-white py-4 rounded-2xl font-black text-xl shadow-lg">Check Word ➔</button>
                </div>
            `;
            document.getElementById('copy-input').focus();
        }

        function validateCopy() {
            const wordObj = levels[currentLevel][currentIndex];
            const input = document.getElementById('copy-input');
            const error = document.getElementById('copy-error');
            
            if (input.value.trim().toLowerCase() === wordObj.word.toLowerCase()) {
                showCoverStep();
            } else {
                input.classList.add('shake', 'border-red-500');
                error.style.opacity = '1';
                setTimeout(() => {
                    input.classList.remove('shake', 'border-red-500');
                    error.style.opacity = '0';
                }, 1500);
            }
        }

        function showCoverStep() {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-purple-500">
                    ${renderHeader()}
                    <div class="h-32 flex flex-col items-center justify-center bg-gray-900 rounded-[1.5rem] mb-8 relative overflow-hidden">
                        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
                        <span class="text-white/10 font-black text-5xl uppercase tracking-[0.3em]">HIDDEN</span>
                        <button onclick="speakWord('${wordObj.word}')" class="speak-btn mt-2 bg-purple-600/30 text-white px-6 py-2 rounded-full text-[10px] font-black border border-white/20 hover:bg-purple-600 transition uppercase tracking-widest">🔊 Listen Again</button>
                    </div>
                    <div class="bg-purple-50 p-4 rounded-2xl border border-purple-100 mb-6 text-center">
                        <h4 class="text-purple-800 font-black text-xs uppercase mb-1 tracking-widest">Step 3: Write from Brain</h4>
                        <p class="text-purple-700 text-sm italic">The word is gone! Can you type it now?</p>
                    </div>
                    <input type="text" id="write-input" autocomplete="off" class="w-full text-center text-3xl font-bold p-4 border-b-4 border-gray-200 focus:border-purple-500 outline-none mb-2 text-gray-700 bg-gray-50 rounded-t-xl" placeholder="...">
                    <div id="write-error" class="text-red-500 font-black text-xs uppercase text-center mb-4 opacity-0 transition-opacity">❌ Not quite! Try typing it again.</div>
                    <button onclick="validateFinal()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg uppercase">Confirm 🏁</button>
                </div>
            `;
            document.getElementById('write-input').focus();
            speakWord(wordObj.word);
        }

        function validateFinal() {
            const wordObj = levels[currentLevel][currentIndex];
            const input = document.getElementById('write-input');
            const error = document.getElementById('write-error');
            
            if (input.value.trim().toLowerCase() === wordObj.word.toLowerCase()) {
                totalStars += 10;
                document.getElementById('global-score').innerText = `STARS: ${totalStars}`;
                showSuccess();
            } else {
                input.classList.add('shake', 'border-red-500');
                error.style.opacity = '1';
                setTimeout(() => {
                    input.classList.remove('shake', 'border-red-500');
                    error.style.opacity = '0';
                    showVisualMemoryStep(input.value.trim());
                }, 1000);
            }
        }

        function showVisualMemoryStep(wrongInput) {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            const options = [wordObj.word.toLowerCase(), wrongInput].sort(() => Math.random() - 0.5);
            app.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-red-500">
                    <div class="text-center mb-8">
                        <span class="text-5xl">👀</span>
                        <h2 class="text-2xl font-black text-gray-800 mt-4 uppercase">Which looks right?</h2>
                        <p class="text-gray-500 text-xs italic mt-2">Pick the spelling you saw in your book.</p>
                        <button onclick="speakWord('${wordObj.word}')" class="speak-btn mt-4 bg-red-50 text-red-600 px-4 py-1 rounded-full font-black text-[10px] border border-red-100 uppercase tracking-widest">🔊 Listen Again</button>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        ${options.map(opt => `
                            <button onclick="checkVisualChoice('${opt}')" class="p-8 border-4 border-gray-100 rounded-[1.5rem] text-3xl font-black text-gray-700 hover:border-green-500 hover:bg-green-50 transition active:scale-95">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function checkVisualChoice(choice) {
            const wordObj = levels[currentLevel][currentIndex];
            if (choice === wordObj.word.toLowerCase()) {
                showLookStep();
            } else {
                showLookStep();
            }
        }

        function showSuccess() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-12 rounded-[2rem] shadow-xl text-center border-t-8 border-green-500">
                    <span class="text-7xl">🥳</span>
                    <h3 class="text-3xl font-black text-green-600 uppercase mt-4 mb-2 tracking-tight">Well Done!</h3>
                    <p class="text-gray-500 mb-8 font-medium">Your brain remembered the spelling.</p>
                    <button onclick="nextWord()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg transform hover:scale-105 transition">CONTINUE ➔</button>
                </div>
            `;
        }

        function nextWord() {
            currentIndex++;
            if (currentIndex < levels[currentLevel].length) {
                showLookStep();
            } else {
                showLevelComplete();
            }
        }

        function showLevelComplete() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-12 rounded-[2.5rem] shadow-xl text-center border-t-8 border-indigo-500">
                    <h2 class="text-3xl font-black text-indigo-800 uppercase mb-2">Level Master!</h2>
                    <p class="text-gray-500 mb-8 font-medium">You finished ${levels[currentLevel].length} tricky words in this level!</p>
                    <div class="text-7xl mb-8">🏆</div>
                    <button onclick="showHome()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl hover:bg-indigo-700 shadow-xl transition">FINISH 🏠</button>
                </div>
            `;
        }

        showHome();
    </script>
</body>
