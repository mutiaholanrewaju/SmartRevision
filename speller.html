<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpeller | Primary 1 Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; }
        .nav-link { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        
        @keyframes pulse-green {
            0%, 100% { background-color: #10b981; transform: scale(1); }
            50% { background-color: #059669; transform: scale(1.05); }
        }
        .speaking { animation: pulse-green 1s infinite; }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .word-grid::-webkit-scrollbar { height: 6px; }
        .word-grid::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        
        .visual-word-box {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            padding: 1rem;
        }

        .visual-word-text {
            font-weight: 900;
            color: white;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 10;
            text-align: center;
            line-height: 1.1;
            word-break: break-word;
        }

        .visual-bg-pattern {
            position: absolute;
            font-size: 10rem;
            opacity: 0.05;
            font-weight: 900;
            color: white;
            white-space: nowrap;
            user-select: none;
        }

        .wrong-option {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            color: #991b1b !important;
        }
    </style>
</head>
<body class="pb-12 min-h-screen">

    <nav id="global-nav" class="sticky top-0 z-50 bg-white border-b border-green-100 shadow-sm px-4 py-3">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <button onclick="showHome()" class="flex items-center gap-2 text-green-600 font-black text-xl italic">
                <span>📚 SmartSpeller</span>
            </button>
            <div id="global-score" class="bg-green-100 text-green-700 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">Stars: 0</div>
        </div>
    </nav>

    <div id="app" class="max-w-2xl mx-auto px-4 mt-6"></div>

    <script>
        let totalStars = parseInt(localStorage.getItem('speller_stars')) || 0;
        document.getElementById('global-score').innerText = `STARS: ${totalStars}`;

        const levels = {
            "Level 1: Short Words": [
                { word: "needle", chunks: "nee-dle", hint: "Tool for sewing.", distractors: ["nidu", "neadle"] },
                { word: "balloon", chunks: "bal-loon", hint: "Air fills this up.", distractors: ["balon", "balun"] },
                { word: "sandy", chunks: "san-dy", hint: "Grainy soil.", distractors: ["sandi", "sandie"] },
                { word: "clay", chunks: "clay", hint: "Smooth soil for pots.", distractors: ["clai", "claey"] },
                { word: "loamy", chunks: "loa-my", hint: "Best soil for plants.", distractors: ["loami", "lowmy"] },
                { word: "stone", chunks: "stone", hint: "Rock particles.", distractors: ["ston", "stowne"] },
                { word: "candle", chunks: "can-dle", hint: "A source of light.", distractors: ["candul", "kandle"] },
                { word: "charcoal", chunks: "char-coal", hint: "Black fuel.", distractors: ["chacoal", "charcol"] },
                { word: "cotton", chunks: "cot-ton", hint: "White material.", distractors: ["cotin", "koton"] },
                { word: "purple", chunks: "pur-ple", hint: "Secondary colour.", distractors: ["pupul", "perple"] },
                { word: "danger", chunks: "dan-ger", hint: "Can cause harm.", distractors: ["danja", "dangr"] },
                { word: "knife", chunks: "knife", hint: "Sharp object.", distractors: ["nife", "kife"] },
                { word: "fenced", chunks: "fen-ced", hint: "Gated area.", distractors: ["fensed", "fense"] },
                { word: "gated", chunks: "gat-ed", hint: "Security entrance.", distractors: ["gated", "gayted"] },
                { word: "skills", chunks: "skills", hint: "Football ability.", distractors: ["skils", "skilz"] },
                { word: "kicking", chunks: "kick-ing", hint: "Hitting with foot.", distractors: ["kikin", "kikking"] },
                { word: "signal", chunks: "sig-nal", hint: "Follow safety road signs.", distractors: ["signel", "signul"] },
                { word: "refuge", chunks: "ref-uge", hint: "Protection.", distractors: ["refuji", "refuige"] },
                { word: "mankind", chunks: "man-kind", hint: "All people.", distractors: ["mankaind", "mankin"] },
                { word: "peacock", chunks: "pea-cock", hint: "A beautiful bird with many feathers.", distractors: ["pecock", "peacok"] }
            ],
            "Level 2: Medium Mastery": [
                { word: "substance", chunks: "sub-stance", hint: "Air is a gaseous ______.", distractors: ["substans", "substense"] },
                { word: "existence", chunks: "ex-is-tence", hint: "Proof of being.", distractors: ["existans", "exis-tence"] },
                { word: "particles", chunks: "par-ti-cles", hint: "Tiny pieces.", distractors: ["paticuls", "partikles"] },
                { word: "identify", chunks: "i-den-ti-fy", hint: "To recognize.", distractors: ["identifai", "idantify"] },
                { word: "primary", chunks: "pri-ma-ry", hint: "Main colours.", distractors: ["praimari", "primery"] },
                { word: "secondary", chunks: "sec-on-da-ry", hint: "Mixed colours.", distractors: ["secondari", "secondery"] },
                { word: "strangers", chunks: "stran-gers", hint: "Unknown people.", distractors: ["strenjas", "stranjers"] },
                { word: "accident", chunks: "ac-ci-dent", hint: "Road trouble.", distractors: ["axident", "accidant"] },
                { word: "watchful", chunks: "watch-ful", hint: "Be careful.", distractors: ["watchfol", "wachful"] },
                { word: "vigilant", chunks: "vi-gi-lant", hint: "Think fast.", distractors: ["vigilant", "vijilant"] },
                { word: "movement", chunks: "move-ment", hint: "Going places.", distractors: ["movmant", "muvement"] },
                { word: "rules", chunks: "rules", hint: "School laws.", distractors: ["ruls", "ruels"] },
                { word: "stopping", chunks: "stop-ping", hint: "Halt the ball.", distractors: ["stopin", "stoppin"] },
                { word: "heading", chunks: "head-ing", hint: "Hit with head.", distractors: ["heding", "heddin"] },
                { word: "dribbling", chunks: "drib-bling", hint: "Control ball.", distractors: ["driblin", "dribbling"] },
                { word: "floating", chunks: "float-ing", hint: "Up in water.", distractors: ["floting", "floatten"] },
                { word: "breathing", chunks: "breath-ing", hint: "In and out.", distractors: ["brethin", "breathing"] },
                { word: "mischief", chunks: "mis-chief", hint: "Evil whisper.", distractors: ["mischif", "mischeef"] },
                { word: "blessing", chunks: "bless-ing", hint: "God's gift.", distractors: ["blesin", "blessin"] },
                { word: "listening", chunks: "lis-ten-ing", hint: "Obeying.", distractors: ["lisnin", "listning"] }
            ],
            "Level 3: Long & Tricky": [
                { word: "gaseous", chunks: "ga-se-ous", hint: "Air state.", distractors: ["gaseos", "gasius"] },
                { word: "decoration", chunks: "dec-o-ra-tion", hint: "Beautifying.", distractors: ["decorashun", "decoretion"] },
                { word: "precautions", chunks: "pre-cau-tions", hint: "Safety steps.", distractors: ["precorshuns", "precaushons"] },
                { word: "suspicious", chunks: "sus-pi-cious", hint: "Looks strange.", distractors: ["suspishos", "suspishus"] },
                { word: "appliances", chunks: "ap-pli-an-ces", hint: "Electric tools.", distractors: ["apliances", "applianses"] },
                { word: "identities", chunks: "i-den-ti-ties", hint: "ID cards.", distractors: ["idantities", "identitis"] },
                { word: "clearance", chunks: "clear-ance", hint: "Permission.", distractors: ["clearents", "clearans"] },
                { word: "installation", chunks: "in-stal-la-tion", hint: "Setting up.", distractors: ["instalashun", "installesun"] },
                { word: "environment", chunks: "en-vi-ron-ment", hint: "Place around.", distractors: ["envaironment", "environmant"] },
                { word: "regulations", chunks: "re-gu-la-tions", hint: "Official rules.", distractors: ["regulashuns", "reguleshons"] },
                { word: "indigenous", chunks: "in-di-ge-nous", hint: "Local games.", distractors: ["indijenos", "indijinus"] },
                { word: "butterfly", chunks: "but-ter-fly", hint: "Swim stroke.", distractors: ["butafly", "butterfli"] },
                { word: "backstroke", chunks: "back-stroke", hint: "Swim stroke.", distractors: ["bakstrok", "backstroak"] },
                { word: "coordinates", chunks: "co-or-di-nates", hint: "Referee job.", distractors: ["cordinetes", "coordintes"] },
                { word: "alphabet", chunks: "al-pha-bet", hint: "Letters.", distractors: ["alfabet", "alphabit"] },
                { word: "orphanage", chunks: "or-pha-nage", hint: "Kids home.", distractors: ["ofanege", "orphanige"] },
                { word: "achievement", chunks: "a-chieve-ment", hint: "Success.", distractors: ["achivemant", "achievment"] },
                { word: "governor", chunks: "gov-er-nor", hint: "State leader.", distractors: ["govanor", "governa"] },
                { word: "president", chunks: "pre-si-dent", hint: "Country leader.", distractors: ["prezident", "presidant"] },
                { word: "traditional", chunks: "tra-di-tion-al", hint: "Old ways.", distractors: ["tradishunal", "traditionel"] }
            ],
            "Level 4: Mega Challenge": [
                { word: "characteristics", chunks: "cha-rac-te-ris-tics", hint: "Qualities.", distractors: ["charataristics", "charactaristics"] },
                { word: "hardworking", chunks: "hard-work-ing", hint: "Busy hero.", distractors: ["hadworkin", "hardworken"] },
                { word: "cleanliness", chunks: "clean-li-ness", hint: "Faith part.", distractors: ["clenlines", "cleanlyness"] },
                { word: "surroundings", chunks: "sur-round-ings", hint: "Area near us.", distractors: ["suroundins", "surrounden"] },
                { word: "ablution", chunks: "ab-lu-tion", hint: "Wudu.", distractors: ["ablushun", "ablosun"] },
                { word: "obedience", chunks: "o-be-di-ence", hint: "Follow laws.", distractors: ["obedients", "obediense"] },
                { word: "democratic", chunks: "de-mo-cra-tic", hint: "Voting name.", distractors: ["democratik", "democrata"] },
                { word: "instrument", chunks: "in-stru-ment", hint: "Musical tool.", distractors: ["instrumant", "instrumant"] },
                { word: "xylophone", chunks: "xy-lo-phone", hint: "Wooden keys.", distractors: ["zylofone", "xylofone"] },
                { word: "unconscious", chunks: "un-con-scious", hint: "Not awake.", distractors: ["unconshos", "unconshus"] }
            ]
        };

        let currentLevel = "";
        let currentIndex = 0;

        function showHome() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="text-center py-6">
                    <h1 class="text-3xl font-black text-green-800 mb-2 uppercase tracking-tight text-balance">SmartSpeller Hub</h1>
                    <p class="text-gray-600 mb-8 font-medium italic">Improving spellings and visual recognition! 🇳🇬</p>
                    <div class="space-y-4">
                        ${Object.keys(levels).map(level => {
                            const prog = localStorage.getItem(`prog_${level}`) || 0;
                            return `
                            <button onclick="startLevel('${level}', ${prog})" class="w-full bg-white p-6 rounded-3xl shadow-sm border-2 border-green-100 hover:border-green-400 hover:shadow-md transition text-left group flex justify-between items-center">
                                <div>
                                    <h3 class="text-lg font-bold text-gray-800 group-hover:text-green-600 uppercase">${level}</h3>
                                    <p class="text-[10px] text-gray-400 mt-1 uppercase font-black">Progress: ${prog}/${levels[level].length}</p>
                                </div>
                                <span class="text-2xl text-green-200 group-hover:text-green-500">➔</span>
                            </button>`}).join('')}
                    </div>
                </div>
            `;
        }

        function startLevel(lvl, index) {
            currentLevel = lvl;
            currentIndex = Math.min(parseInt(index), levels[lvl].length - 1);
            showLookStep();
        }

        function speak(text) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85;
            utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
        }

        function jumpToWord(idx) {
            currentIndex = idx;
            showLookStep();
        }

        function renderHeader() {
            return `
                <div class="mb-4">
                    <div class="flex justify-between items-center text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">
                        <button onclick="showHome()" class="hover:text-red-500">✖ Quit</button>
                        <span>${currentLevel}</span>
                        <span>Word ${currentIndex + 1}/${levels[currentLevel].length}</span>
                    </div>
                    <div id="word-grid-container" class="word-grid flex gap-2 overflow-x-auto pb-3 mb-2 px-1">
                        ${levels[currentLevel].map((w, i) => `
                            <button id="nav-item-${i}" onclick="jumpToWord(${i})" class="flex-shrink-0 w-10 h-10 rounded-full text-xs font-bold border-2 transition
                                ${i === currentIndex ? 'border-green-600 bg-green-600 text-white' : 
                                  i < currentIndex ? 'border-green-200 bg-green-50 text-green-600' : 'border-gray-100 bg-white text-gray-400'}">
                                ${i + 1}
                            </button>`).join('')}
                    </div>
                </div>
            `;
        }

        function autoScrollNav() {
            setTimeout(() => {
                const activeItem = document.getElementById(`nav-item-${currentIndex}`);
                if (activeItem) {
                    activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }, 100);
        }

        function getDynamicFontSize(word) {
            const len = word.length;
            if (len > 12) return '2.2rem';
            if (len > 10) return '2.8rem';
            if (len > 8) return '3.5rem';
            return '4.5rem';
        }

        function showLookStep() {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            const fontSize = getDynamicFontSize(wordObj.word);
            
            app.innerHTML = `
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border-t-8 border-green-500">
                    ${renderHeader()}
                    <div class="text-center">
                        <div class="visual-word-box mb-6">
                            <div class="visual-bg-pattern">${wordObj.word}</div>
                            <h1 class="visual-word-text" style="font-size: ${fontSize}">${wordObj.word}</h1>
                        </div>
                        <button onclick="speak('${wordObj.word}')" class="mb-4 bg-green-100 p-4 rounded-full shadow-sm hover:bg-green-200 transition">🔊 Hear Word</button>
                        <h2 class="text-4xl font-black text-gray-800 mb-2 tracking-tight">${wordObj.word}</h2>
                        <div class="flex justify-center gap-2 mb-4 flex-wrap">
                            ${wordObj.chunks.split('-').map(c => `<span class="bg-green-50 px-3 py-1 rounded-lg text-green-700 font-bold border border-green-100 text-lg">${c}</span>`).join('')}
                        </div>
                        <p class="text-gray-400 text-sm italic">"${wordObj.hint}"</p>
                    </div>
                    <button onclick="showCopyStep()" class="mt-8 w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg transform active:scale-95 transition uppercase tracking-widest">I'VE LOOKED. NEXT ➔</button>
                </div>
            `;
            localStorage.setItem(`prog_${currentLevel}`, currentIndex);
            speak(wordObj.word);
            autoScrollNav();
        }

        function showCopyStep() {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            const fontSize = wordObj.word.length > 10 ? '3.5rem' : '5rem';

            app.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-yellow-500">
                    ${renderHeader()}
                    <div class="text-center mb-8">
                        <h2 class="font-black text-gray-800 mb-4 leading-none" style="font-size: ${fontSize}">${wordObj.word}</h2>
                        <p class="text-yellow-700 text-sm font-bold uppercase tracking-widest italic underline underline-offset-4">Step 2: Type the word exactly</p>
                    </div>
                    <input type="text" id="copy-input" autocomplete="off" class="w-full text-center text-3xl font-black p-4 border-b-4 border-gray-200 focus:border-yellow-500 outline-none mb-2 text-gray-700 bg-gray-50 rounded-t-xl" placeholder="...">
                    <div id="copy-error" class="text-red-500 font-black text-xs uppercase text-center mb-4 opacity-0 transition-opacity">❌ Check the letters above!</div>
                    <button onclick="validateCopy()" class="w-full bg-yellow-500 text-white py-4 rounded-2xl font-black text-xl shadow-lg uppercase tracking-widest">CHECK WORD ➔</button>
                </div>
            `;
            document.getElementById('copy-input').focus();
            autoScrollNav();
        }

        function validateCopy() {
            const input = document.getElementById('copy-input');
            const error = document.getElementById('copy-error');
            if (input.value.trim().toLowerCase() === levels[currentLevel][currentIndex].word.toLowerCase()) {
                showCoverStep();
            } else {
                input.classList.add('shake', 'border-red-500');
                error.style.opacity = '1';
                setTimeout(() => { input.classList.remove('shake', 'border-red-500'); error.style.opacity = '0'; }, 1500);
            }
        }

        function showCoverStep() {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-purple-500">
                    ${renderHeader()}
                    <div class="h-40 flex flex-col items-center justify-center bg-gray-900 rounded-[1.5rem] mb-8 relative overflow-hidden">
                        <span class="text-white/10 font-black text-5xl tracking-widest uppercase select-none">Hidden</span>
                        <button onclick="speak('${wordObj.word}')" class="mt-4 bg-purple-600 text-white px-6 py-2 rounded-full font-black uppercase border border-purple-400 hover:bg-purple-700 transition shadow-lg">🔊 Hear Word</button>
                    </div>
                    <div class="text-center mb-6">
                         <p class="text-purple-700 text-sm font-bold uppercase tracking-widest italic underline underline-offset-4">Step 3: Write from memory</p>
                    </div>
                    <input type="text" id="write-input" autocomplete="off" class="w-full text-center text-3xl font-black p-4 border-b-4 border-gray-200 focus:border-purple-500 outline-none mb-2 text-gray-700 bg-gray-50 rounded-t-xl" placeholder="...">
                    <div id="write-error" class="text-red-500 font-black text-xs uppercase text-center mb-4 opacity-0 transition-opacity">❌ Try again! Memory test.</div>
                    <button onclick="validateFinal()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg uppercase tracking-widest">CONFIRM 🏁</button>
                </div>
            `;
            document.getElementById('write-input').focus();
            speak(wordObj.word);
            autoScrollNav();
        }

        function validateFinal() {
            const input = document.getElementById('write-input');
            const error = document.getElementById('write-error');
            const val = input.value.trim().toLowerCase();
            const correct = levels[currentLevel][currentIndex].word.toLowerCase();

            if (val === correct) {
                totalStars += 10;
                localStorage.setItem('speller_stars', totalStars);
                document.getElementById('global-score').innerText = `STARS: ${totalStars}`;
                showVisualMemoryStep(null); 
            } else {
                input.classList.add('shake', 'border-red-500');
                error.style.opacity = '1';
                setTimeout(() => { 
                    input.classList.remove('shake', 'border-red-500');
                    error.style.opacity = '0';
                    input.focus();
                }, 1500);
            }
        }

        function showVisualMemoryStep(wrongInput) {
            const wordObj = levels[currentLevel][currentIndex];
            const app = document.getElementById('app');
            const correct = wordObj.word.toLowerCase();
            
            let options = [correct, ...wordObj.distractors];
            if (wrongInput && !options.includes(wrongInput.toLowerCase())) options.push(wrongInput.toLowerCase());
            options = [...new Set(options)].sort(() => Math.random() - 0.5).slice(0, 3);

            app.innerHTML = `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-red-500">
                    <div class="text-center mb-8">
                        <span class="text-6xl">👀</span>
                        <h2 class="text-2xl font-black text-gray-800 mt-4 uppercase tracking-tight">Visual Check</h2>
                        <p class="text-gray-500 text-sm font-bold mt-2">Which one matches the correct spelling?</p>
                        <div id="visual-error" class="text-red-500 font-black text-xs uppercase mt-2 opacity-0 transition-opacity">❌ Incorrect, try again!</div>
                        <button onclick="speak('${wordObj.word}')" class="mt-4 text-red-600 font-black text-[10px] uppercase border border-red-100 px-4 py-2 rounded-full">🔊 Listen Again</button>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        ${options.map(opt => {
                            const btnFontSize = opt.length > 12 ? 'text-xl' : 'text-3xl';
                            return `
                            <button onclick="checkVisualChoice('${opt}', this)" class="p-8 border-4 border-gray-100 rounded-[1.5rem] font-black text-gray-700 hover:border-green-500 hover:bg-green-50 transition active:scale-95 ${btnFontSize}">
                                ${opt}
                            </button>`}).join('')}
                    </div>
                </div>
            `;
            autoScrollNav();
        }

        function checkVisualChoice(choice, btn) {
            const correct = levels[currentLevel][currentIndex].word.toLowerCase();
            if (choice.toLowerCase() === correct) {
                totalStars += 5;
                localStorage.setItem('speller_stars', totalStars);
                document.getElementById('global-score').innerText = `STARS: ${totalStars}`;
                showSuccess();
            } else {
                btn.classList.add('shake', 'wrong-option');
                document.getElementById('visual-error').style.opacity = '1';
                setTimeout(() => { 
                    btn.classList.remove('shake');
                }, 500);
            }
        }

        function showSuccess() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-12 rounded-[2rem] shadow-xl text-center border-t-8 border-green-500">
                    <span class="text-8xl">🏆</span>
                    <h3 class="text-4xl font-black text-green-600 uppercase mt-6 mb-2 tracking-tight">Perfect!</h3>
                    <p class="text-gray-500 mb-8 font-medium italic">You recognized the correct spelling!</p>
                    <button onclick="nextWord()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg transform hover:scale-105 transition uppercase tracking-widest">NEXT WORD ➔</button>
                </div>
            `;
            autoScrollNav();
        }

        function nextWord() {
            currentIndex++;
            if (currentIndex < levels[currentLevel].length) showLookStep();
            else showLevelComplete();
        }

        function showLevelComplete() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="bg-white p-12 rounded-[2.5rem] shadow-xl text-center border-t-8 border-indigo-500">
                    <h2 class="text-3xl font-black text-indigo-800 uppercase mb-2">Level Mastered!</h2>
                    <p class="text-gray-500 mb-8 font-medium italic">Excellent work! You are a spelling star.</p>
                    <div class="text-8xl mb-10">🥇</div>
